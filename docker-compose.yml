services:
  gfx906-llama-docker:
    image: kinchahoy/gfx906-llama-docker
    container_name: gfx906-llama-docker
    user: "1000:1000"
    ports:
      - "8000:8000"
      - "5800:5800"
    volumes:
      - ~/.cache/llama.cpp:/home/llama/models
      - ~/.cache/llama.cpp:/home/llama/.cache/llama.cpp
      - ./live-monitored/llama-swap-config.yml:/home/llama/services/llama-swap/config.yml
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    restart: unless-stopped
