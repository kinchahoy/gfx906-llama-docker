services:
  llama-gfx906-swap:
    image: llama-gfx906-swap
    container_name: llama-gfx906-swap
    ports:
      - "8000:8000"
      - "5800:5800"
    volumes:
      - ~/.cache/llama.cpp:/home/llama/models
      - ./live-monitored/llama-swap-config.yml:/home/llama/services/llama-swap/config.yml
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    restart: unless-stopped
